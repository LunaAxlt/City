<!-- ========== ЧАТ ВНИЗУ ФОРУМА (БЕЗ СОХРАНЕНИЯ) ========== -->
<style>
    .forum-chat {
        margin-top: 40px;
        background: #1a1a1a;
        border-radius: 30px;
        padding: 25px;
        border: 1px solid #2a2a2a;
        box-shadow: 0 0 20px rgba(155,89,182,0.2);
    }
    .chat-title {
        color: #9b59b6;
        font-size: 1.8rem;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .chat-messages {
        background: #1e1e1e;
        border-radius: 20px;
        padding: 20px;
        height: 300px;
        overflow-y: auto;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .message {
        background: #2a2a2a;
        padding: 12px 15px;
        border-radius: 15px;
        max-width: 80%;
        word-break: break-word;
        border-left: 3px solid #9b59b6;
    }
    .message .author {
        color: #9b59b6;
        font-weight: 600;
        font-size: 0.9rem;
        margin-bottom: 5px;
    }
    .message .text {
        color: white;
    }
    .chat-input-area {
        display: flex;
        gap: 15px;
        align-items: center;
    }
    .chat-input {
        flex: 1;
        background: #252525;
        border: 2px solid #2a2a2a;
        border-radius: 40px;
        padding: 15px 20px;
        color: white;
        font-size: 1rem;
        outline: none;
    }
    .chat-input:focus {
        border-color: #9b59b6;
    }
    .chat-send {
        background: #9b59b6;
        border: none;
        border-radius: 40px;
        padding: 15px 30px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }
    .chat-send:active {
        background: #b07cc6;
        transform: scale(0.97);
    }
</style>

<div class="forum-chat" id="forumChat">
    <div class="chat-title">
        <span>💬</span>
        <span>Чат форума (сообщения не сохраняются)</span>
    </div>
    
    <div class="chat-messages" id="chatMessages"></div>
    
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Имя: сообщение">
        <button class="chat-send" id="sendBtn">Отправить</button>
    </div>
</div>

<script>
(function() {
    const messagesDiv = document.getElementById('chatMessages');
    const input = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    
    // Массив сообщений (только в памяти)
    let messages = [];
    
    // Функция отображения сообщений
    function renderMessages() {
        messagesDiv.innerHTML = '';
        messages.forEach(msg => {
            // Парсим имя и текст
            let author = 'Гость';
            let text = msg;
            if (msg.includes(':')) {
                const parts = msg.split(':');
                author = parts[0].trim();
                text = parts.slice(1).join(':').trim();
            }
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `
                <div class="author">${author}</div>
                <div class="text">${text}</div>
            `;
            messagesDiv.appendChild(msgDiv);
        });
        // Прокрутка вниз
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    // Отправка сообщения
    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        
        messages.push(text);
        input.value = '';
        renderMessages();
    }
    
    // Обработчики
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
})();
</script>
<!-- ========== КОНЕЦ ЧАТА ========== -->
