<!-- ========== ЧАТ-ВИДЖЕТ (БЕЗ СОХРАНЕНИЯ) ========== -->
<style>
    .chat-widget {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .chat-icon {
        width: 60px;
        height: 60px;
        background: #9b59b6;
        border-radius: 50%;
        box-shadow: 0 4px 15px rgba(155,89,182,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
        border: 2px solid white;
    }
    .chat-icon:hover {
        transform: scale(1.1);
    }
    .chat-icon span {
        font-size: 30px;
        color: white;
    }
    .chat-box {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 320px;
        max-width: 90vw;
        background: #1e1e1e;
        border: 2px solid #9b59b6;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: none;
        flex-direction: column;
        overflow: hidden;
    }
    .chat-box.open {
        display: flex;
    }
    .chat-header {
        background: #9b59b6;
        color: white;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
    }
    .chat-header .close-btn {
        cursor: pointer;
        font-size: 20px;
    }
    .chat-messages {
        padding: 15px;
        max-height: 300px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .message {
        background: #2a2a2a;
        color: white;
        padding: 8px 12px;
        border-radius: 15px;
        max-width: 90%;
        word-break: break-word;
    }
    .message.own {
        background: #9b59b6;
        align-self: flex-end;
    }
    .message .author {
        font-size: 0.8rem;
        color: #aaa;
        margin-bottom: 4px;
    }
    .message.own .author {
        color: rgba(255,255,255,0.7);
    }
    .chat-input-area {
        display: flex;
        padding: 15px;
        border-top: 1px solid #333;
        gap: 10px;
    }
    .chat-input {
        flex: 1;
        background: #2a2a2a;
        border: none;
        border-radius: 20px;
        padding: 10px 15px;
        color: white;
        outline: none;
    }
    .chat-send {
        background: #9b59b6;
        border: none;
        border-radius: 20px;
        padding: 10px 20px;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }
    .chat-send:hover {
        background: #b07cc6;
    }
</style>

<div class="chat-widget" id="chatWidget">
    <!-- Иконка -->
    <div class="chat-icon" id="chatIcon">
        <span>💬</span>
    </div>
    
    <!-- Окно чата -->
    <div class="chat-box" id="chatBox">
        <div class="chat-header">
            <span>💬 Чат форума</span>
            <span class="close-btn" id="closeChat">✕</span>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Сюда будут добавляться сообщения -->
        </div>
        
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="messageInput" placeholder="Ваше имя: сообщение">
            <button class="chat-send" id="sendBtn">→</button>
        </div>
    </div>
</div>

<script>
(function() {
    const chatIcon = document.getElementById('chatIcon');
    const chatBox = document.getElementById('chatBox');
    const closeBtn = document.getElementById('closeChat');
    const messagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // Массив для хранения сообщений (только в памяти)
    let messages = [];

    // Открыть чат
    chatIcon.addEventListener('click', () => {
        chatBox.classList.add('open');
    });

    // Закрыть чат
    closeBtn.addEventListener('click', () => {
        chatBox.classList.remove('open');
    });

    // Функция отображения сообщений
    function renderMessages() {
        messagesDiv.innerHTML = '';
        messages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            // Парсим имя и сообщение (если есть двоеточие)
            let author = 'Гость';
            let text = msg;
            if (msg.includes(':')) {
                const parts = msg.split(':');
                author = parts[0].trim();
                text = parts.slice(1).join(':').trim();
            }
            
            msgDiv.innerHTML = `<div class="author">${author}</div><div>${text}</div>`;
            messagesDiv.appendChild(msgDiv);
        });
        // Прокрутка вниз
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Отправка сообщения
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        // Добавляем в массив
        messages.push(text);
        
        // Очищаем поле
        messageInput.value = '';
        
        // Обновляем отображение
        renderMessages();
    }

    // Обработчики отправки
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Закрытие при клике вне виджета
    document.addEventListener('click', (e) => {
        if (!chatWidget.contains(e.target)) {
            chatBox.classList.remove('open');
        }
    });
})();
</script>
<!-- ========== КОНЕЦ ЧАТА ========== -->
