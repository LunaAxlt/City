<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>LUNA CITY · стройка и чат</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 20px;
            border-bottom: 3px solid #9b59b6;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .header h1 {
            color: white;
            font-size: 2rem;
        }
        .header h1 span {
            color: #9b59b6;
        }
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .stat {
            background: #252525;
            padding: 8px 16px;
            border-radius: 40px;
            border-left: 3px solid #9b59b6;
        }
        .stat-label {
            color: #888;
            font-size: 0.8rem;
        }
        .stat-value {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Игровое поле */
        .canvas-wrapper {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 15px;
            border: 1px solid #333;
            margin-bottom: 15px;
            overflow: auto;
        }
        canvas {
            display: block;
            width: 800px;
            height: 600px;
            background: #2a2a2a;
            border-radius: 16px;
            margin: 0 auto;
        }

        /* Палитра зданий */
        .palette {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            background: #1a1a1a;
            border-radius: 24px;
            padding: 15px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }
        .palette-item {
            background: #252525;
            border-radius: 16px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border-left: 3px solid #9b59b6;
        }
        .palette-item.selected {
            background: #9b59b6;
        }
        .palette-emoji {
            font-size: 2rem;
        }
        .palette-name {
            color: white;
            font-size: 0.8rem;
        }
        .palette-price {
            color: #9b59b6;
            font-size: 0.7rem;
        }
        .palette-item.selected .palette-price {
            color: white;
        }

        /* Чат */
        .chat-section {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #333;
        }
        .chat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #9b59b6;
            padding-bottom: 10px;
        }
        .chat-header h2 {
            color: white;
        }
        .chat-messages {
            height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            background: #252525;
            border-radius: 16px;
            padding: 10px 15px;
            border-left: 3px solid #9b59b6;
        }
        .message-author {
            color: #9b59b6;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .message-text {
            color: white;
        }
        .message-time {
            color: #666;
            font-size: 0.7rem;
            text-align: right;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            background: #252525;
            border: 1px solid #333;
            border-radius: 30px;
            padding: 12px 20px;
            color: white;
            outline: none;
        }
        .chat-send {
            background: #9b59b6;
            border: none;
            border-radius: 30px;
            padding: 0 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .action-btn {
            background: #252525;
            border: 1px solid #333;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            cursor: pointer;
            text-align: center;
            flex: 1;
        }
        .action-btn:active {
            background: #9b59b6;
        }
        .status {
            text-align: center;
            color: #9b59b6;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌆 <span>LUNA CITY</span></h1>
        <div class="stats">
            <div class="stat"><div class="stat-label">💰 бюджет</div><div class="stat-value" id="money">5000</div></div>
            <div class="stat"><div class="stat-label">👥 жители</div><div class="stat-value" id="pop">0</div></div>
            <div class="stat"><div class="stat-label">⚡ энергия</div><div class="stat-value" id="energy">50</div></div>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="cityCanvas" width="800" height="600"></canvas>
    </div>

    <div class="palette" id="palette"></div>

    <div class="chat-section">
        <div class="chat-header">
            <span>💬</span>
            <h2>Чат города</h2>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Имя: сообщение">
            <button class="chat-send" onclick="sendMessage()">→</button>
        </div>
    </div>

    <div class="actions">
        <div class="action-btn" onclick="saveGame()">💾 сохранить</div>
        <div class="action-btn" onclick="loadGame()">📂 загрузить</div>
        <div class="action-btn" onclick="resetGame()">🔄 новая</div>
    </div>
    <div class="status" id="status">🔵 игра готова</div>
</div>

<script>
// ==================== ПОДКЛЮЧЕНИЕ К SUPABASE (НОВЫЕ КЛЮЧИ) ====================
const supabase = window.supabase.createClient(
    'https://rjyhffzokcofifrylwdk.supabase.co',
    'sb_publishable_LePL-UhpKA4w8r8hkM0wGg_r_bYTwJ8'
);

// ==================== ИГРА ====================
const canvas = document.getElementById('cityCanvas');
const ctx = canvas.getContext('2d');

const CELL_SIZE = 30;
const MAP_WIDTH = 26;
const MAP_HEIGHT = 20;

let game = {
    money: 5000,
    population: 0,
    energy: 50,
    buildings: [],
    nextId: 1
};

const buildingTypes = [
    { id: 'house',  emoji: '🏠', name: 'дом',    cost: 200, pop: 8,  energy: 0 },
    { id: 'shop',   emoji: '🏪', name: 'магазин',cost: 300, pop: 3,  energy: -2 },
    { id: 'factory',emoji: '🏭', name: 'завод',  cost: 600, pop: 5,  energy: -15 },
    { id: 'power',  emoji: '⚡', name: 'энергия',cost: 400, pop: 0,  energy: 30 },
    { id: 'park',   emoji: '🌳', name: 'парк',   cost: 100, pop: 0,  energy: 2 }
];

let selectedBuilding = buildingTypes[0];

// ==================== ЧАТ ====================
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');

async function loadChatMessages() {
    const { data, error } = await supabase
        .from('chat_messages')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(30);
    
    if (error) return;
    
    chatMessages.innerHTML = '';
    data.reverse().forEach(msg => {
        chatMessages.innerHTML += `
            <div class="message">
                <div class="message-author">${msg.author}</div>
                <div class="message-text">${msg.text}</div>
                <div class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</div>
            </div>
        `;
    });
}

async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;
    
    let author = 'Игрок';
    let message = text;
    
    if (text.includes(':')) {
        const parts = text.split(':');
        author = parts[0].trim() || 'Игрок';
        message = parts.slice(1).join(':').trim() || '...';
    }
    
    const { error } = await supabase
        .from('chat_messages')
        .insert([{ author, text: message }]);
    
    if (!error) {
        chatInput.value = '';
        loadChatMessages();
    }
}

// Подписка на новые сообщения
supabase
    .channel('chat')
    .on('postgres_changes', 
        { event: 'INSERT', schema: 'public', table: 'chat_messages' },
        () => loadChatMessages()
    )
    .subscribe();

// ==================== ИГРОВАЯ ЛОГИКА ====================
function saveGame() {
    localStorage.setItem('lunaCityGame', JSON.stringify(game));
    document.getElementById('status').innerText = '✅ сохранено';
    setTimeout(() => document.getElementById('status').innerText = '🔵 игра готова', 1500);
}

function loadGame() {
    const saved = localStorage.getItem('lunaCityGame');
    if (saved) {
        game = JSON.parse(saved);
        document.getElementById('status').innerText = '✅ загружено';
    }
    updateStats();
    drawMap();
}

function resetGame() {
    if (confirm('Новая игра?')) {
        game = { money: 5000, population: 0, energy: 50, buildings: [], nextId: 1 };
        saveGame();
        updateStats();
        drawMap();
    }
}

function updateStats() {
    document.getElementById('money').innerText = game.money;
    document.getElementById('pop').innerText = game.population;
    document.getElementById('energy').innerText = game.energy;
}

function drawMap() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Сетка
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 1;
    for (let i = 0; i <= MAP_WIDTH; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE + 50, 30);
        ctx.lineTo(i * CELL_SIZE + 50, 30 + MAP_HEIGHT * CELL_SIZE);
        ctx.stroke();
    }
    for (let i = 0; i <= MAP_HEIGHT; i++) {
        ctx.beginPath();
        ctx.moveTo(50, i * CELL_SIZE + 30);
        ctx.lineTo(50 + MAP_WIDTH * CELL_SIZE, i * CELL_SIZE + 30);
        ctx.stroke();
    }

    // Здания
    game.buildings.forEach(b => {
        const type = buildingTypes.find(t => t.id === b.type);
        if (type) {
            ctx.font = '30px "Segoe UI Emoji"';
            ctx.fillStyle = 'white';
            ctx.fillText(type.emoji, 50 + b.x * CELL_SIZE + 5, 30 + b.y * CELL_SIZE + 25);
        }
    });
}

function tryBuild(x, y) {
    if (x < 0 || x >= MAP_WIDTH || y < 0 || y >= MAP_HEIGHT) return false;
    if (game.buildings.some(b => b.x === x && b.y === y)) return false;
    if (game.money < selectedBuilding.cost) return false;

    game.money -= selectedBuilding.cost;
    game.energy += selectedBuilding.energy;
    game.population += selectedBuilding.pop;
    game.buildings.push({
        id: game.nextId++,
        x, y,
        type: selectedBuilding.id
    });
    saveGame();
    updateStats();
    drawMap();
    return true;
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    
    const tileX = Math.floor((mouseX - 50) / CELL_SIZE);
    const tileY = Math.floor((mouseY - 30) / CELL_SIZE);
    
    tryBuild(tileX, tileY);
});

function renderPalette() {
    const palette = document.getElementById('palette');
    palette.innerHTML = '';
    buildingTypes.forEach(type => {
        const div = document.createElement('div');
        div.className = 'palette-item';
        if (selectedBuilding === type) div.classList.add('selected');
        div.innerHTML = `
            <span class="palette-emoji">${type.emoji}</span>
            <span class="palette-name">${type.name}</span>
            <span class="palette-price">${type.cost}💰</span>
        `;
        div.addEventListener('click', () => {
            selectedBuilding = type;
            document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
        });
        palette.appendChild(div);
    });
}

// ==================== СТАРТ ====================
renderPalette();
loadGame();
loadChatMessages();
updateStats();
drawMap();

setInterval(() => {
    game.money += Math.floor(game.population * 0.1);
    game.energy += 1;
    updateStats();
    saveGame();
}, 10000);
</script>
</body>
</html>
