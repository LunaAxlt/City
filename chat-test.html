<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест чата Luna City</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .chat-box {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #333;
        }
        .messages {
            height: 300px;
            overflow-y: auto;
            border-bottom: 1px solid #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: #252525;
            border-radius: 8px;
            border-left: 3px solid #9b59b6;
        }
        .author {
            color: #9b59b6;
            font-weight: bold;
        }
        .time {
            color: #666;
            font-size: 0.8rem;
            text-align: right;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: none;
            background: #252525;
            color: white;
            outline: none;
        }
        button {
            background: #9b59b6;
            border: none;
            border-radius: 20px;
            padding: 12px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #b07cc6;
        }
        .status {
            margin-top: 10px;
            color: #9b59b6;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 style="text-align:center;">💬 Чат Luna City</h1>
    <div class="chat-box">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Имя: сообщение">
            <button onclick="sendMessage()">Отправить</button>
        </div>
        <div class="status" id="status"></div>
    </div>

    <script>
        // Твои новые ключи
        const supabase = window.supabase.createClient(
            'https://rjyhffzokcofifrylwdk.supabase.co',
            'sb_publishable_LePL-UhpKA4w8r8hkM0wGg_r_bYTwJ8'
        );

        // Загрузка сообщений
        async function loadMessages() {
            const { data, error } = await supabase
                .from('chat_messages')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(30);
            if (error) {
                document.getElementById('status').innerText = '❌ Ошибка загрузки: ' + error.message;
                return;
            }
            const container = document.getElementById('messages');
            container.innerHTML = '';
            data.reverse().forEach(msg => {
                const time = new Date(msg.created_at).toLocaleTimeString();
                container.innerHTML += `
                    <div class="message">
                        <span class="author">${msg.author}</span>
                        <div>${msg.text}</div>
                        <div class="time">${time}</div>
                    </div>
                `;
            });
            document.getElementById('status').innerText = '✅ Сообщения загружены';
        }

        // Отправка сообщения
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            let author = 'Игрок';
            let message = text;
            if (text.includes(':')) {
                const parts = text.split(':');
                author = parts[0].trim() || 'Игрок';
                message = parts.slice(1).join(':').trim() || '...';
            }

            const { error } = await supabase
                .from('chat_messages')
                .insert([{ author, text: message }]);

            if (error) {
                document.getElementById('status').innerText = '❌ Ошибка отправки: ' + error.message;
            } else {
                input.value = '';
                document.getElementById('status').innerText = '✅ Отправлено';
                loadMessages(); // перезагружаем список
            }
        }

        // Подписка на новые сообщения (мгновенное обновление)
        supabase
            .channel('chat')
            .on('postgres_changes', 
                { event: 'INSERT', schema: 'public', table: 'chat_messages' },
                (payload) => {
                    // Добавляем новое сообщение без перезагрузки
                    const container = document.getElementById('messages');
                    const msg = payload.new;
                    const time = new Date(msg.created_at).toLocaleTimeString();
                    container.innerHTML += `
                        <div class="message">
                            <span class="author">${msg.author}</span>
                            <div>${msg.text}</div>
                            <div class="time">${time}</div>
                        </div>
                    `;
                })
            .subscribe();

        // Первая загрузка
        loadMessages();
    </script>
</body>
</html>
